// modul: assoc gti5800 app — OpenGL ES 1.0; önfrissítés min API 14 (I5800 API 7–8: régi 1.3 / csak manuális sideload)
plugins {
    id 'com.android.application'
}

android {
    namespace 'tomi.assoc.gti5800'
    compileSdk 34

    defaultConfig {
        applicationId "tomi.assoc.gti5800"
        // Önfrissítés: androidx.core min 14 — a GT-I5800 (API 7–8) használja a 1.3-as, nem-önfrissítő buildet; 1.4+: min Android 4.0 (API 14)
        minSdk 14
        targetSdk 34
        versionCode 7
        versionName "1.6-3dtext"
        // Távoli frissítés: this JSON a GitHubon (main), nem kell újrafordítani a verzió URL miatt
        buildConfigField "String", "UPDATE_JSON_URL",
            "\"https://raw.githubusercontent.com/GuyWithARiceCooker/assoc-gti5800/main/docs/update.json\""
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    buildFeatures {
        buildConfig = true
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}
