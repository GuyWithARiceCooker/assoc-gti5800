// modul: assoc gti5800 app — FIMG / OpenGL ES 1.0, min API 7–8 (Galaxy 3)
plugins {
    id 'com.android.application'
}

android {
    namespace 'tomi.assoc.gti5800'
    compileSdk 34

    defaultConfig {
        applicationId "tomi.assoc.gti5800"
        // Galaxy 3 (GT-I5800): 2.1 = API 7, Froyo = 8 — ES 1.0 path
        // targetSdk: sideload Android 15+ újabb gép: „must target at least 24” – régi I5800 továbbra is a minSdk-t nézi
        minSdk 7
        targetSdk 34
        versionCode 4
        versionName "1.3-fekete-jav"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // tiszta framework; a régi telón nincs AndroidX
}
